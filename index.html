<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dunkin Faceit Board — Match Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="img/logo.png">
<link rel="stylesheet" href="css/style.css">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<div class="app" id="main-app">

  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <img src="img/logo.png" alt="Dunkin Faceit Board" style="width:120px;height:120px;object-fit:contain;flex-shrink:0" />
      <div>
        <div class="logo">Dunkin <span>Faceit Board</span></div>
        <div class="tagline">In-House Match Tracker</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-left:auto">
      <div id="admin-input-area" style="display:flex;align-items:center;gap:6px">
        <input type="password" id="pw-input" placeholder="Admin password..." maxlength="32"
               style="width:160px;padding:6px 10px;font-size:12px;border-radius:6px;background:var(--c-surface2);border:1px solid var(--c-border2);color:var(--c-text);outline:none" />
        <button onclick="tryAdminLogin()"
                style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border-radius:6px;border:none;background:var(--c-accent);color:#000;cursor:pointer;white-space:nowrap">
          Enter
        </button>
        <span id="pw-error" style="font-size:11px;color:var(--c-lose)"></span>
      </div>
      <div id="admin-badge-area" style="display:none;align-items:center;gap:8px">
        <span style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:4px;background:rgba(168,85,247,0.15);color:var(--c-accent);border:1px solid rgba(168,85,247,0.25)">Admin</span>
        <button onclick="adminLogout()"
                style="font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;border:1px solid var(--c-border2);background:transparent;color:var(--c-muted);cursor:pointer;font-family:'Exo 2',sans-serif;transition:color 0.15s"
                onmouseover="this.style.color='var(--c-text)'" onmouseout="this.style.color='var(--c-muted)'">
          Log out
        </button>
      </div>
      <div class="nav">
        <button class="active" onclick="showTab('leaderboard')">Board</button>
        <button onclick="showTab('matches')">Matches</button>
        <button onclick="showTab('players')">Players</button>
        <button class="admin-only" onclick="showTab('add')">+ Log</button>
        <button class="admin-only" onclick="showTab('log')">Audit</button>
      </div>
    </div>
  </header>

  <!-- LEADERBOARD -->
  <div id="tab-leaderboard" class="section visible">
    <div class="season-banner">
      <div><span class="season-label" id="season-label">Season 1</span></div>
      <button class="btn-sm admin-only" onclick="newSeason()" style="display:none">New Season</button>
    </div>
    <div class="section-top"><div class="section-title">Season Standings</div></div>
    <div class="lb-header" style="grid-template-columns:36px 1fr 80px 60px 60px 80px 80px">
      <div>#</div><div>Player</div><div>Top Heroes</div>
      <div style="text-align:right">W</div>
      <div style="text-align:right">L</div>
      <div style="text-align:right">Win Rate</div>
      <div style="text-align:right">Games</div>
    </div>
    <div id="leaderboard-list"></div>
  </div>

  <!-- MATCH HISTORY -->
  <div id="tab-matches" class="section">
    <div class="section-top"><div class="section-title">Match History</div></div>
    <div id="matches-list"></div>
  </div>

  <!-- PLAYERS -->
  <div id="tab-players" class="section">
    <div class="add-player-form">
      <input type="text" id="new-player-name" placeholder="Search or add player..." maxlength="24" oninput="filterPlayers(this.value)" />
      <button class="btn-sm admin-only" onclick="addPlayer()">+ Add</button>
    </div>
    <div id="players-grid" class="players-grid"></div>
  </div>

  <!-- LOG MATCH (admin only) -->
  <div id="tab-add" class="section">
    <div class="form-card">
      <div class="form-title">Log Match</div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="match-date" />
        </div>
        <div class="form-group">
          <label>Duration (optional)</label>
          <input type="text" id="match-duration" placeholder="e.g. 32 min" />
        </div>
      </div>
      <div class="teams-row">
        <div class="form-group">
          <label style="color:var(--c-radiant)">Radiant <span style="color:var(--c-muted);font-weight:400">(5 players)</span></label>
          <div class="team-rows" id="team1-rows"></div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="form-group">
          <label style="color:var(--c-dire)">Dire <span style="color:var(--c-muted);font-weight:400">(5 players)</span></label>
          <div class="team-rows" id="team2-rows"></div>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Winner</label>
        <div class="win-selector">
          <button class="win-btn" id="win-btn-radiant" onclick="selectWinner('radiant')">Radiant</button>
          <button class="win-btn" id="win-btn-dire" onclick="selectWinner('dire')">Dire</button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label>Notes (optional)</label>
        <input type="text" id="match-notes" placeholder="e.g. comeback win, final push..." />
      </div>
      <button class="btn-primary" onclick="logMatch()">Log Match</button>
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--c-border);display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <button class="btn-sm" onclick="document.getElementById('import-match-file').click()">Import Match</button>
        <input type="file" id="import-match-file" accept=".json" style="display:none" onchange="importMatchIntoForm(event)" />
      </div>
    </div>
  </div>

  <!-- AUDIT LOG (admin only) -->
  <div id="tab-log" class="section">
    <div class="section-top">
      <div class="section-title">Audit Log</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:12px;color:var(--c-muted)" id="log-count"></span>
        <button class="btn-sm" onclick="exportDataConfirm()">Export Backup</button>
      </div>
    </div>
    <div id="audit-list"></div>
  </div>

</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Confirm</div>
    <div class="modal-msg" id="modal-msg"></div>
    <input type="text" id="modal-input" class="modal-input" style="display:none" />
    <div class="modal-actions">
      <button class="modal-cancel" onclick="modalResolve(false)">Cancel</button>
      <button class="modal-confirm" id="modal-confirm-btn" onclick="modalResolve(true)">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- JS — load order matters -->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/heroes.js"></script>
<script src="js/dropdown.js"></script>
<script src="js/firebase.js"></script>
<script src="js/ui.js"></script>
<script src="js/render.js"></script>
<script src="js/actions.js"></script>
<script src="js/auth.js"></script>
<script>
  // ── Init ──────────────────────────────────────────────────────
  document.getElementById('match-date').value = new Date().toISOString().split('T')[0];

  if (localStorage.getItem(ADMIN_SESSION_KEY) === '1') {
    setAdminMode(true);
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) modalResolve(false);
  });

  document.addEventListener('click', e => {
    const matchBtn = e.target.closest('.del-match');
    if (matchBtn) { deleteMatch(parseInt(matchBtn.dataset.idx, 10)); return; }
    const expBtn = e.target.closest('.exp-match');
    if (expBtn) { exportMatch(parseInt(expBtn.dataset.idx, 10)); return; }
    const playerBtn = e.target.closest('.del-player');
    if (playerBtn) { removePlayer(parseInt(playerBtn.dataset.idx, 10)); return; }
    const renameBtn = e.target.closest('.rename-player');
    if (renameBtn) { renamePlayer(parseInt(renameBtn.dataset.idx, 10)); return; }
  });

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryAdminLogin();
  });

  document.getElementById('new-player-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });

  loadHeroes().then(() => initFirebase()).catch(() => initFirebase());
</script>
</body>
</html>
